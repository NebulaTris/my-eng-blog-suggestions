name: Idea Manager

on:
  issues:
    types: [ opened, edited ]

jobs:
  manage_idea:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process Idea Issue
        uses: actions/github-script@v7
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          script: |
            const issue = context.payload.issue;

            // Check if it's an idea
            const isIdea = issue.labels.some(l => l.name === 'idea') || 
                           (issue.title && issue.title.toLowerCase().includes('[idea]'));
                           
            if (!isIdea) {
              console.log("Not an idea issue. Skipping.");
              return;
            }

            // 1. Add +1 reaction on creation
            if (context.payload.action === 'opened') {
              try {
                await github.rest.reactions.createForIssue({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  content: '+1',
                });
                console.log("Added +1 reaction.");
              } catch (e) {
                console.log("Failed to add reaction:", e);
              }
            }

            // 2. Validate idea content
            const title = issue.title;
            const body = issue.body || '';

            const apiKey = process.env.GEMINI_API_KEY;
            if (!apiKey) {
              console.log("No GEMINI_API_KEY found in secrets. Skipping AI moderation.");
              return;
            }

            console.log("Analyzing issue content with Gemini...");
            const prompt = `You are a moderator for a GitHub repository. Review the following issue submitted as a "blog idea".
            Title: ${title}
            Body: ${body}

            Determine if this issue is:
            1. Explicit, offensive, or inappropriate.
            2. Completely random words, gibberish, or clearly spam.
            3. Not a reasonable idea at all.

            If it violates any of these, it is invalid. Otherwise, it is valid.
            Reply strictly with a JSON object: {"valid": true} if it's fine, or {"valid": false, "reason": "Short explanation of why it was rejected"} if it violates the rules.`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { response_mime_type: 'application/json' }
              })
            });

            const data = await res.json();

            try {
              const text = data.candidates[0].content.parts[0].text;
              const result = JSON.parse(text);
              
              if (!result.valid) {
                console.log("Issue flagged as invalid. Closing...");
                
                // Add a comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Hi @${issue.user.login}, thanks for your submission. Our automated moderation has flagged this issue as invalid for the following reason:\n\n> ${result.reason}\n\nThe issue will be closed. If you believe this is a mistake, please reach out to the maintainer.`
                });
                
                // Close the issue
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                
                // Add an invalid label (optional, we can try if it doesn't fail, but we'd need to create it or just apply it. We'll skip for simplicity).
              } else {
                console.log("Issue is valid.");
              }
            } catch(e) {
              console.log("Error parsing AI response or taking action:", e);
              console.log("Raw response data:", JSON.stringify(data));
            }
