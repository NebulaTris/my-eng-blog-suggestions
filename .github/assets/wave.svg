<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" preserveAspectRatio="none" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e8855a" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#e8855a" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#7f77dd" stop-opacity="0.5"/>
      <stop offset="80%"  stop-color="#5dcaa5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e8855a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Subtle gradient line -->
  <line x1="0" y1="30" x2="1200" y2="30" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Coral pulse traveling left → right -->
  <g>
    <circle cy="30" r="4" fill="#e8855a">
      <animate attributeName="cx" values="0;1200" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cy="30" r="10" fill="#e8855a" opacity="0.25">
      <animate attributeName="cx" values="0;1200" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.25;0.25;0" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Purple pulse, offset -->
  <g>
    <circle cy="30" r="3" fill="#7f77dd">
      <animate attributeName="cx" values="0;1200" dur="6s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="6s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
